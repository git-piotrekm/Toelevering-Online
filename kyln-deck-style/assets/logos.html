<!--
  KYLN DECK · LOGO ASSETS
  =======================
  Both logos are defined once as SVG symbols and reused anywhere via <use>.
  They inherit color via `currentColor` — set color on the wrapping element,
  white OR near-black ONLY. Never recolor to indigo or any other palette color.

  On light slides (white / bg-soft):   color: var(--ink);
  On dark / indigo / image slides:      color: #fff;

  ─────────────────────────────────────────────────────────────────────────
  STEP 1 — PASTE THE DEFS BLOCK ONCE at the top of <body> in your deck:
  ─────────────────────────────────────────────────────────────────────────

  <svg style="display:none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      ... copy the <symbol> elements from the DEFS block below ...
    </defs>
  </svg>

  ─────────────────────────────────────────────────────────────────────────
  STEP 2 — REFERENCE a logo anywhere with a one-liner:
  ─────────────────────────────────────────────────────────────────────────

  Full Kyln logo (mark + wordmark):
    <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-kyln"/></svg>

  Kyln mark only (no wordmark):
    <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-kyln-mark"/></svg>

  Amsterdam Standard (with box frame):
    <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-ams"/></svg>

  ─────────────────────────────────────────────────────────────────────────
  SIZING — set height on the wrapper, let the SVG scale via width:auto:
  ─────────────────────────────────────────────────────────────────────────

  Chrome / corner (small):
    <div class="deck-logo" style="color: var(--ink); height: 28px;">
      <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-kyln"/></svg>
    </div>

  Title or closing slide (large):
    <div style="color: #fff; height: 90px;">
      <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-kyln"/></svg>
    </div>

  Co-brand lockup (Kyln + Amsterdam Standard side by side):
    <div class="logo-lockup" style="color: var(--ink);">
      <span style="height: 32px;">
        <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-kyln"/></svg>
      </span>
      <span class="logo-divider"></span>
      <span style="height: 22px;">
        <svg style="height:100%;width:auto;fill:currentColor;"><use href="#logo-ams"/></svg>
      </span>
    </div>
-->

<style>
  /* Logos inherit currentColor — only ever white or near-black */
  .deck-logo svg,
  .logo-lockup svg { height: 100%; width: auto; display: inline-block; fill: currentColor; }
  .deck-logo { display: inline-flex; align-items: center; }

  /* A divider for co-brand lockups */
  .logo-lockup { display: inline-flex; align-items: center; gap: 1.25rem; }
  .logo-lockup .logo-divider {
    width: 1px; height: 1.4em; background: currentColor; opacity: 0.3;
  }
  .logo-lockup span { display: inline-flex; align-items: center; }

  /* Convenience helper for placing a logo in the slide chrome */
  .chrome-logo { position: absolute; top: clamp(2rem, 5vw, 5rem); left: clamp(2rem, 5vw, 5rem); height: 28px; z-index: 3; }
</style>
